<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bangalore House Price Prediction</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="script.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>Bangalore House Price Prediction</h1>
      <form class="form">
        <label>Enter Area (Square Feet)</label>
        <input type="number" id="sqft" placeholder="Enter area" />

        <label>Select BHK</label>
        <select id="bhk">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>

        <label>Select Bath</label>
        <select id="bath">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>

        <label>Choose Location</label>
        <select id="location">
          <option value="">Loading locations...</option>
        </select>

        <button type="button" onclick="onClickedEstimatePrice()">
          Estimate Price
        </button>
      </form>

      <div id="loading" class="loading" style="display: none">Loading...</div>
      <h2 id="estimatedPrice"></h2>

      <canvas id="priceChart"></canvas>
    </div>
  </body>
</html>
